<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-company-brain プレゼンテーション</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #111;
      color: #fff;
    }

    .slide {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      text-align: center;
    }

    .slide h1 {
      font-size: 3rem;
      margin-bottom: 24px;
    }

    .slide h2 {
      font-size: 2.2rem;
      margin-bottom: 20px;
    }

    .slide p {
      font-size: 1.4rem;
      line-height: 1.8;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <!-- スライド1: タイトル -->
  <section class="slide">
    <h1>T-company-brain</h1>
    <p>サブタイトルをここに書く</p>
  </section>

  <!-- スライド2: 課題 -->
  <section class="slide">
    <h2>課題</h2>
    <p>解決したい課題をここに書く</p>
  </section>

  <!-- スライド3: 解決策 -->
  <section class="slide">
    <h2>解決策</h2>
    <p>提案する解決策をここに書く</p>
  </section>

  <!-- スライド4: デモ -->
  <section class="slide">
    <h2>デモ</h2>
    <p>デモの内容・スクリーンショットをここに置く</p>
  </section>

  <!-- スライド5: まとめ -->
  <section class="slide">
    <h2>まとめ</h2>
    <p>まとめ・今後の展望をここに書く</p>
  </section>
</body>
</html>
