<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Revision-History Brain — ピッチ資料</title>
<style>
  :root {
    --paper: #fbfbf6;
    --ink: #1c1c1c;
    --line: #2f2f2f;
    --thin: #8a8a8a;
    --dim: #3a5f8a;
    --red: #c0392b;
    --muted: #6d6d6d;
    --mono: "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #202020; overflow: hidden; }
  body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; color: var(--ink); }

  #stage { position: absolute; left: 50%; top: 50%; width: 1280px; height: 720px; transform-origin: center; }

  .slide {
    position: absolute; inset: 0; width: 1280px; height: 720px;
    background: var(--paper); display: none; overflow: hidden;
  }
  .slide.active { display: block; }

  /* ── Drawing frame: outer + inner border, zone marks ─────────────── */
  .slide::before { content: ""; position: absolute; inset: 12px; border: 1.5px solid var(--line); pointer-events: none; }
  .slide::after  { content: ""; position: absolute; inset: 30px; border: 2.5px solid var(--line); pointer-events: none; }
  .zones { position: absolute; inset: 12px; pointer-events: none; font-family: var(--mono); font-size: 11px; color: var(--ink); }
  .zones span { position: absolute; }
  .zt { top: 1px; }  .zb { bottom: 1px; }
  .zl { left: 4px; } .zr { right: 4px; }
  .tickt { position: absolute; top: 0; width: 1px; height: 18px; background: var(--line); }
  .tickb { position: absolute; bottom: 0; width: 1px; height: 18px; background: var(--line); }
  .tickl { position: absolute; left: 0; height: 1px; width: 18px; background: var(--line); }
  .tickr { position: absolute; right: 0; height: 1px; width: 18px; background: var(--line); }

  /* ── Title block (every sheet) ───────────────────────────────────── */
  .tblock {
    position: absolute; right: 32.5px; bottom: 32.5px; width: 430px;
    border: 2px solid var(--line); border-right: none; border-bottom: none;
    background: var(--paper); font-size: 11px; z-index: 5;
    display: grid; grid-template-columns: 120px 1fr 90px 70px;
    grid-template-rows: 26px 30px 24px;
  }
  .tblock div { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 2px 6px; overflow: hidden; }
  .tblock div:nth-child(4n) { border-right: none; }
  .tblock .lbl { display: block; font-size: 8px; color: var(--muted); font-family: var(--mono); letter-spacing: 0.08em; }
  .tblock .big { font-size: 13px; font-weight: 700; }
  .tblock .mono { font-family: var(--mono); }

  /* ── Content area ────────────────────────────────────────────────── */
  .content { position: absolute; inset: 33px; padding: 30px 38px; }

  /* Dimension-styled heading: label above a dimension line with arrows */
  .dimh { margin-bottom: 26px; }
  .dimh h2 { font-size: 30px; font-weight: 800; letter-spacing: 0.01em; }
  .dimh h2 .jp { color: var(--muted); font-size: 16px; font-weight: 600; margin-left: 12px; }
  .dimline { position: relative; height: 1.5px; background: var(--dim); margin-top: 10px; }
  .dimline::before, .dimline::after {
    content: ""; position: absolute; top: -4.25px; border-top: 5px solid transparent; border-bottom: 5px solid transparent;
  }
  .dimline::before { left: 0; border-right: 12px solid var(--dim); }
  .dimline::after { right: 0; border-left: 12px solid var(--dim); }
  .dimline .ext { position: absolute; top: -8px; width: 1px; height: 18px; background: var(--dim); }
  .dimline .ext.l { left: 0; } .dimline .ext.r { right: 0; }

  .lead { font-size: 19px; line-height: 1.55; max-width: 900px; }
  .lead b, .em { color: var(--red); }
  .note { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .mono { font-family: var(--mono); }

  /* Cover */
  .cover-center { position: absolute; left: 80px; right: 80px; top: 150px; }
  .cover-code { font-family: var(--mono); font-size: 14px; color: var(--dim); letter-spacing: 0.25em; margin-bottom: 18px; }
  .cover-title { font-size: 46px; font-weight: 800; line-height: 1.25; }
  .cover-title .r { color: var(--red); }
  .cover-sub { margin-top: 22px; font-size: 20px; color: var(--ink); }
  .cover-sub .jp { display: block; margin-top: 8px; font-size: 15px; color: var(--muted); }
  .stamp {
    position: absolute; right: 90px; top: 120px; width: 130px; height: 130px; border: 3px double var(--red);
    border-radius: 50%; color: var(--red); display: flex; align-items: center; justify-content: center;
    text-align: center; font-weight: 800; font-size: 15px; transform: rotate(12deg); line-height: 1.3; opacity: 0.9;
  }

  /* Cycle diagram (problem) */
  .cycle { display: flex; align-items: stretch; gap: 0; margin: 26px 0 18px; }
  .cbox { border: 2px solid var(--line); background: #fff; padding: 12px 14px; width: 218px; }
  .cbox h4 { font-size: 15px; margin-bottom: 4px; }
  .cbox p { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .carrow { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 74px; }
  .carrow .shaft { position: relative; width: 100%; height: 1.5px; background: var(--dim); }
  .carrow .shaft::after { content: ""; position: absolute; right: 0; top: -4.25px; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 11px solid var(--dim); }
  .carrow .cap { font-size: 10.5px; color: var(--dim); font-family: var(--mono); margin-bottom: 5px; text-align: center; }
  .quote { border-left: 4px solid var(--red); padding: 10px 16px; font-size: 18px; margin-top: 22px; background: #fff; max-width: 860px; }
  .quote .who { display: block; font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* Revision table (insight + roadmap) */
  table.rev { border-collapse: collapse; background: #fff; font-size: 14px; margin-top: 18px; }
  table.rev th, table.rev td { border: 1px solid var(--line); padding: 7px 12px; text-align: left; }
  table.rev th { font-size: 11px; font-family: var(--mono); letter-spacing: 0.1em; background: var(--paper); }
  table.rev .mark { font-family: var(--mono); font-weight: 700; }
  table.rev td.why { color: var(--red); font-weight: 600; }
  table.rev tr.now td { background: #fdf0ee; }
  .maparrow { font-family: var(--mono); color: var(--dim); font-size: 14px; margin: 4px 0; }

  /* Screenshot figures + balloons */
  .shot { position: relative; border: 2px solid var(--line); background: #fff; }
  .shot img { display: block; width: 100%; height: auto; }
  .balloon {
    position: absolute; width: 30px; height: 30px; border: 2px solid var(--red); border-radius: 50%;
    background: #fff; color: var(--red); font-weight: 800; font-size: 15px; font-family: var(--mono);
    display: flex; align-items: center; justify-content: center; z-index: 3;
  }
  .balloon::after { content: ""; position: absolute; width: 26px; height: 2px; background: var(--red); left: 26px; top: 12px; transform-origin: left center; }
  .balloon.bl::after { transform: rotate(160deg); }
  .balloon.br::after { transform: rotate(20deg); }
  .legend { font-size: 14.5px; line-height: 1.5; }
  .legend li { list-style: none; margin-bottom: 13px; display: flex; gap: 10px; }
  .legend .n { flex: none; width: 26px; height: 26px; border: 2px solid var(--red); border-radius: 50%; color: var(--red); font-family: var(--mono); font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 13px; }

  /* Filmstrip */
  .strip { display: flex; align-items: center; gap: 0; margin-top: 8px; }
  .frame3 { width: 340px; }
  .frame3 .shot { border-width: 2px; }
  .frame3 .cap { margin-top: 8px; font-size: 13.5px; line-height: 1.45; }
  .frame3 .cap b { font-family: var(--mono); color: var(--dim); }

  /* Pipeline */
  .pipe { display: flex; align-items: center; margin: 30px 0 22px; }
  .pbox { border: 2px solid var(--line); background: #fff; padding: 14px 16px; width: 235px; }
  .pbox h4 { font-size: 15px; }
  .pbox p { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.45; }
  .pbox.hot { border-color: var(--red); }
  .pbox.hot h4 { color: var(--red); }

  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 34px; align-items: start; }

  /* vs table */
  table.vs { border-collapse: collapse; background: #fff; font-size: 14px; margin-top: 20px; width: 100%; }
  table.vs th, table.vs td { border: 1px solid var(--line); padding: 9px 12px; text-align: left; }
  table.vs th { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; }
  table.vs td.us { font-weight: 700; }
  table.vs td.us .em { color: var(--red); }

  .hatch { background-image: repeating-linear-gradient(45deg, transparent 0 5px, rgba(58,95,138,0.16) 5px 6px); }

  .foot-hint { position: fixed; left: 16px; bottom: 10px; color: #888; font-size: 11px; font-family: var(--mono); z-index: 50; }

  @media print {
    html, body { background: #fff; overflow: visible; }
    #stage { position: static; transform: none !important; width: auto; height: auto; }
    .slide { display: block; position: relative; page-break-after: always; margin: 0 auto; }
    .foot-hint { display: none; }
  }
</style>
</head>
<body>
<div id="stage"></div>
<div class="foot-hint">←/→ 移動 · P 印刷 · <a href="index.html" style="color:#aaa">EN</a></div>

<template id="slides">

<!-- ═══ 1. 表紙 ═══ -->
<section class="slide" data-title="Revision-History Brain" data-code="RHB-000" data-rev="△0">
  <div class="content">
    <div class="cover-center">
      <div class="cover-code">DWG NO. RHB-2026 &nbsp;·&nbsp; 組織の記憶を、CADの中へ</div>
      <div class="cover-title">
        図面は、すべての変更の理由を<br/>
        <span class="r">もう知っている。</span><br/>
        誰も読まないだけ。<span class="r">私たちはそれを喋らせる。</span>
      </div>
      <div class="cover-sub">
        Revision-History Brain — 過去の失敗知見が、検索なしで<b>「描いている最中」</b>に設計者へ届く。
        <span class="jp">The revision block is a 50-year commit log. We are its first reader.</span>
      </div>
    </div>
    <div class="stamp">実機デモ<br/>あり</div>
  </div>
</section>

<!-- ═══ 2. 課題 ═══ -->
<section class="slide" data-title="課題 — 5〜10年の再発ループ" data-code="RHB-001" data-rev="△1">
  <div class="content">
    <div class="dimh">
      <h2>製造業は、同じ失敗を5〜10年周期で解き直している</h2>
      <div class="dimline"><span class="ext l"></span><span class="ext r"></span></div>
    </div>
    <div class="cycle">
      <div class="cbox"><h4>失敗が起きる</h4><p>振動クラック、曲げ変形…… きちんと対策され、図面の改訂欄に記録される。</p></div>
      <div class="carrow"><span class="cap">数年後</span><span class="shaft"></span></div>
      <div class="cbox"><h4>ベテランが覚えている</h4><p>文書は存在する — しかし<b>インデックスはベテランの頭の中</b>。若手は聞いて回るしかない。</p></div>
      <div class="carrow"><span class="cap">異動・退職</span><span class="shaft"></span></div>
      <div class="cbox"><h4>インデックスが失われる</h4><p>知見は紙の上に残ったまま、誰も辿り着けない。そして全員がそれを「普通」だと思っている。</p></div>
      <div class="carrow"><span class="cap">類似の新規設計</span><span class="shaft"></span></div>
      <div class="cbox" style="border-color:var(--red)"><h4 style="color:var(--red)">同じ失敗が再発</h4><p>同じ調査、同じ対策、同じ改訂 — 前回から5〜10年後に。</p></div>
    </div>
    <div class="quote">
      「このトラブル、前にも見た気がする…… <b>でも、どのプロジェクトだったか?</b>」
      <span class="who">— 諦めて解き直す直前の、すべての設計責任者</span>
    </div>
    <p class="note" style="margin-top:14px">記録の問題ではない。すべて文書化されていた。これは<b>到達性</b>の問題である。</p>
  </div>
</section>

<!-- ═══ 3. 洞察 ═══ -->
<section class="slide" data-title="洞察 — 図面にはGitがある" data-code="RHB-002" data-rev="△1">
  <div class="content">
    <div class="dimh">
      <h2>図面には、もうGitがある。 <span class="jp">改訂欄 — 50 years of commit logs</span></h2>
      <div class="dimline"><span class="ext l"></span><span class="ext r"></span></div>
    </div>
    <div class="cols">
      <div>
        <p class="lead">製造業の図面には<b>改訂欄</b>がある: すべての変更と<em>その理由</em>が、数十年にわたり業務ルールとして記録されてきた。</p>
        <div style="margin-top:22px">
          <div class="maparrow">△ 改訂記号&nbsp;&nbsp;⟶&nbsp;&nbsp;コミット</div>
          <div class="maparrow">変更理由&nbsp;&nbsp;⟶&nbsp;&nbsp;コミットメッセージ</div>
          <div class="maparrow">流用設計&nbsp;&nbsp;⟶&nbsp;&nbsp;フォーク</div>
          <div class="maparrow" style="color:var(--red); font-weight:700">ツーリング (blame / lint / CI)&nbsp;&nbsp;⟶&nbsp;&nbsp;皆無。50年間。</div>
        </div>
        <p class="note" style="margin-top:20px">コーパスは既に存在する — コールドスタートなし、行動変容の強制なし。<br/>私たちは「最初の読者」を作っている。</p>
      </div>
      <div>
        <table class="rev">
          <tr><th>記号</th><th>日付</th><th>変更内容</th><th>理由 — 埋もれた金脈</th></tr>
          <tr><td class="mark">△3</td><td class="mono">2021-03</td><td>曲げ線際の穴を移動</td><td class="why">曲げ加工時の変形対策</td></tr>
          <tr><td class="mark">△2</td><td class="mono">2019-07</td><td>穴位置変更</td><td class="why">エッジ距離不足による振動試験クラック対策</td></tr>
          <tr><td class="mark">△1</td><td class="mono">2018-04</td><td>穴径φ6→φ8</td><td class="why">組付誤差の吸収</td></tr>
        </table>
        <p class="note" style="margin-top:10px">デモコーパスの実物の改訂欄 — 手書きではなく、製品のパーサが図面から抽出したもの。</p>
      </div>
    </div>
  </div>
</section>

<!-- ═══ 4. プロダクト ═══ -->
<section class="slide" data-title="プロダクト — 描く手を止める記憶" data-code="RHB-003" data-rev="△1">
  <div class="content">
    <div class="dimh">
      <h2>git blame × 常時レビュアーを、CADの中に</h2>
      <div class="dimline"><span class="ext l"></span><span class="ext r"></span></div>
    </div>
    <div class="cols" style="grid-template-columns: 1.6fr 1fr">
      <div class="shot">
        <img src="img/pitch-warning.png" alt="警告の瞬間" />
        <div class="balloon bl" style="right:2%; top:30%;">1</div>
        <div class="balloon bl" style="right:2%; top:46%;">2</div>
        <div class="balloon br" style="left:24%; top:56%;">3</div>
      </div>
      <ul class="legend">
        <li><span class="n">1</span><span><b>図面そのものがクエリ。</b>品番は図枠から自動で読まれる — 設計者は何も入力せず、何も検索していない。</span></li>
        <li><span class="n">2</span><span><b>2019年の失敗が、今日のミスを止める。</b>曲げ線際に描いた穴が、まさに同じパターンを直した改訂を呼び出す — <span class="em">レビューではなく、描いている最中に</span>。</span></li>
        <li><span class="n">3</span><span><b>決定的チェック+来歴つき知見。</b>ライブの幾何ルールは、由来となった実際の改訂行に紐づいている。</span></li>
      </ul>
    </div>
  </div>
</section>

<!-- ═══ 5. デモ3ビート ═══ -->
<section class="slide" data-title="魔法の瞬間 — 3ビート" data-code="RHB-004" data-rev="△1">
  <div class="content">
    <div class="dimh">
      <h2>開く。描く。2019年に止められる。</h2>
      <div class="dimline"><span class="ext l"></span><span class="ext r"></span></div>
    </div>
    <div class="strip">
      <div class="frame3">
        <div class="shot"><img src="img/pitch-clean.png" alt="図面を開く"/></div>
        <p class="cap"><b>01 開く</b> — 標準図枠の新規図面。図枠からファミリーの知見がロードされる。クリックはゼロ。</p>
      </div>
      <div class="carrow"><span class="cap">穴を1つ描く</span><span class="shaft"></span></div>
      <div class="frame3">
        <div class="shot"><img src="img/pitch-warning.png" alt="警告"/></div>
        <p class="cap"><b>02 警告</b> — 穴が曲げ線から2mmに落ちる。ドックが割り込む: <span style="color:var(--red)">曲げ変形リスク — △3(2021)で対策済みのパターン</span>。</p>
      </div>
      <div class="carrow"><span class="cap">警告をクリック</span><span class="shaft"></span></div>
      <div class="frame3">
        <div class="shot"><img src="img/pitch-lightbox.png" alt="過去図面"/></div>
        <p class="cap"><b>03 学ぶ</b> — 元図面が並列表示され、改訂行がハイライトされる。穴を動かせば警告は消える。</p>
      </div>
    </div>
    <p class="note" style="margin-top:16px">上のすべてが動く実物 — このデモと同じビルド、184テスト、モックアップなし。</p>
  </div>
</section>

<!-- ═══ 6. 仕組み ═══ -->
<section class="slide" data-title="仕組み" data-code="RHB-005" data-rev="△1">
  <div class="content">
    <div class="dimh">
      <h2>DXFを入れると、知見が出てくる。PLM不要。</h2>
      <div class="dimline"><span class="ext l"></span><span class="ext r"></span></div>
    </div>
    <div class="pipe">
      <div class="pbox"><h4>図面アーカイブ</h4><p>ファイルサーバに眠る数十年分のDXF/DWG。図枠、改訂欄、寸法 — すでにそこにあるもの。</p></div>
      <div class="carrow"><span class="cap">改訂欄をパース</span><span class="shaft"></span></div>
      <div class="pbox hot"><h4>知見の導出</h4><p>改訂行 → 構造化された失敗知見。部品ファミリーと幾何パターンに紐づけ。AIが人間の簡潔な理由文を読む。</p></div>
      <div class="carrow"><span class="cap">ルール+検索</span><span class="shaft"></span></div>
      <div class="pbox"><h4>CADの中へ</h4><p>描いている最中に決定的チェックが発火。来歴カードから元図面が開き、改訂行がハイライトされる。</p></div>
    </div>
    <div class="cols">
      <p class="lead" style="font-size:17px">このデモのパイプラインは<b>本物</b>: いま見たカードはすべて、図面自身の改訂欄からパーサが導出したもの — 手書きではない。</p>
      <p class="lead" style="font-size:17px"><b>設計思想からローカル完結。</b>ブレインは顧客の壁の内側で動く。何も外に出ない。</p>
    </div>
  </div>
</section>

<!-- ═══ 7. Why now ═══ -->
<section class="slide" data-title="Why now" data-code="RHB-006" data-rev="△1">
  <div class="content">
    <div class="dimh">
      <h2>コミットログは50年間、読者を待っていた</h2>
      <div class="dimline"><span class="ext l"></span><span class="ext r"></span></div>
    </div>
    <div class="cycle" style="margin-top:40px">
      <div class="cbox" style="width:300px"><h4>1970年代 →</h4><p>改訂欄が業務ルールとして定着。簡潔で、専門用語だらけで、人間的 — 半世紀のあいだ<b>ソフトウェアには読めなかった</b>。</p></div>
      <div class="carrow"><span class="shaft"></span></div>
      <div class="cbox" style="width:300px"><h4>2023 →</h4><p>LLMがついに変更意図を読む: 「エッジ距離不足による振動試験クラック対策」が原因・パターン・対策に分解できる。</p></div>
      <div class="carrow"><span class="shaft"></span></div>
      <div class="cbox" style="width:300px; border-color:var(--red)"><h4 style="color:var(--red)">今</h4><p>ローカルAIがオンプレに置ける — 図面データが触れることを許される、唯一のアーキテクチャ。</p></div>
    </div>
    <p class="lead" style="margin-top:36px">知見はずっとそこにあった。読者がようやく可能になった — しかも<b>図面のある場所に住める形</b>で。</p>
  </div>
</section>

<!-- ═══ 8. モート ═══ -->
<section class="slide" data-title="モート — データは外に出ない" data-code="RHB-007" data-rev="△1">
  <div class="content">

<script>
(function () {
  const stage = document.getElementById('stage');
  const tpl = document.getElementById('slides');
  stage.appendChild(tpl.content.cloneNode(true));
  const slides = [...stage.querySelectorAll('.slide')];
  const N = slides.length;

  // Per-sheet chrome: zone marks + title block.
  slides.forEach((s, i) => {
    const zones = document.createElement('div');
    zones.className = 'zones';
    let zhtml = '';
    for (let k = 0; k < 6; k++) {
      const x = 8 + (k + 0.5) * (100 / 6);
      zhtml += `<span class="zt" style="left:${x}%">${6 - k}</span><span class="zb" style="left:${x}%">${6 - k}</span>`;
      if (k > 0) zhtml += `<div class="tickt" style="left:${8 + k * (100 / 6)}%"></div><div class="tickb" style="left:${8 + k * (100 / 6)}%"></div>`;
    }
    'DCBA'.split('').forEach((c, k) => {
      const y = 4 + (k + 0.5) * (100 / 4);
      zhtml += `<span class="zl" style="top:${y}%">${c}</span><span class="zr" style="top:${y}%">${c}</span>`;
      if (k > 0) zhtml += `<div class="tickl" style="top:${4 + k * (100 / 4)}%"></div><div class="tickr" style="top:${4 + k * (100 / 4)}%"></div>`;
    });
    zones.innerHTML = zhtml;
    s.appendChild(zones);

    const t = document.createElement('div');
    t.className = 'tblock';
    t.innerHTML = `
      <div style="grid-column:1/3"><span class="lbl">COMPANY</span><span class="big">NAKAGATER MFG.</span></div>
      <div><span class="lbl">DWG NO.</span><span class="mono">${s.dataset.code}</span></div>
      <div><span class="lbl">REV</span><span class="mono">${s.dataset.rev}</span></div>
      <div style="grid-column:1/3"><span class="lbl">TITLE</span><span class="big">${s.dataset.title}</span></div>
      <div><span class="lbl">SCALE</span><span class="mono">1:1</span></div>
      <div><span class="lbl">SIZE</span><span class="mono">16:9</span></div>
      <div><span class="lbl">DRAWN</span><span class="mono">2026-07</span></div>
      <div><span class="lbl">PROJECT</span><span class="mono">Revision-History Brain</span></div>
      <div style="grid-column:3/5"><span class="lbl">SHEET</span><span class="mono">${i + 1} / ${N}</span></div>`;
    s.appendChild(t);
  });

  let cur = Math.min(Math.max((parseInt(location.hash.slice(1), 10) || 1) - 1, 0), N - 1);
  function show(i) {
    cur = Math.min(Math.max(i, 0), N - 1);
    slides.forEach((s, k) => s.classList.toggle('active', k === cur));
    location.hash = String(cur + 1);
  }
  function fit() {
    const sc = Math.min(innerWidth / 1280, innerHeight / 720) * 0.98;
    stage.style.transform = `translate(-50%, -50%) scale(${sc})`;
  }
  addEventListener('resize', fit);
  addEventListener('hashchange', () => {
    const n = (parseInt(location.hash.slice(1), 10) || 1) - 1;
    if (n !== cur) show(n);
  });
  addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') show(cur + 1);
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') show(cur - 1);
    else if (e.key === 'Home') show(0);
    else if (e.key === 'End') show(N - 1);
    else if (e.key === 'p' || e.key === 'P') print();
  });
  stage.addEventListener('click', (e) => {
    const r = stage.getBoundingClientRect();
    show(e.clientX - r.left < r.width / 3 ? cur - 1 : cur + 1);
  });
  fit();
  show(cur);
})();
</script>
